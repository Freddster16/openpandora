name: OpenPandora

on:
  push:
    branches-ignore:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    name: Check pushed branch
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install OpenPandora
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run local QA check
        id: qa
        run: |
          set +e
          openpandora check --since origin/main
          exit_code="$?"
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          if [ "$exit_code" -ne 0 ]; then
            echo "needs_fix=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_fix=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run configured project commands
        id: project_commands
        run: |
          set +e
          openpandora test
          exit_code="$?"
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          if [ "$exit_code" -ne 0 ]; then
            echo "needs_fix=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_fix=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open fix pull request
        if: ${{ (steps.qa.outputs.needs_fix == 'true' || steps.project_commands.outputs.needs_fix == 'true') && (vars.OPENPANDORA_PROVIDER != '' || vars.OPENPANDORA_LOCAL_COMMAND != '') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENPANDORA_PROVIDER: ${{ vars.OPENPANDORA_PROVIDER }}
          OPENPANDORA_LOCAL_COMMAND: ${{ vars.OPENPANDORA_LOCAL_COMMAND }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: openpandora fix-pr --since origin/main --create

      - name: Fail original branch check
        if: ${{ steps.qa.outputs.needs_fix == 'true' || steps.project_commands.outputs.needs_fix == 'true' }}
        run: exit 1
