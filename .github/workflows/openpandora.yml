name: OpenPandora

on:
  push:
    branches-ignore:
      - main

permissions:
  contents: read

jobs:
  check:
    name: Check pushed branch
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install OpenPandora
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run local QA check
        run: openpandora check

